<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Foto Timemark</title>
  <meta name="description" content="Pipeline koreksi watermark Timemark.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:linear-gradient(150deg,#080811 0%,#0f0f24 30%,#16163a 60%,#0e0e2a 100%);
      color:#e2e8f0;display:flex;align-items:center;justify-content:center;padding:.75rem
    }
    .app{width:100%;max-width:1500px;height:100%;display:flex;flex-direction:column;gap:.5rem}
    .header{text-align:center;flex-shrink:0}
    .header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{font-size:.65rem;color:#475569;margin-top:.05rem}

    .main{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;flex:1;min-height:0}

    .col{display:flex;flex-direction:column;gap:.5rem;min-height:0}
    .col-left .card{flex:1;min-height:0;display:flex;flex-direction:column}
    .col-right .card:first-child{flex-shrink:0}
    .col-right .card:last-child{flex:1;min-height:0}

    .card{
      background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.05);
      border-radius:10px;padding:.5rem;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden
    }
    .card .lbl{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#64748b;flex-shrink:0;margin-bottom:.3rem}
    .card ul{list-style:none;overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;gap:1px}
    .card li{font-size:.72rem;padding:.12rem .3rem;background:rgba(255,255,255,.015);border-radius:3px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
    .card .empty{color:#334155;font-size:.65rem;text-align:center;padding:.6rem 0}
    .file-count{font-size:1.4rem;font-weight:700;color:#6366f1;text-align:center;padding:.8rem 0;background:rgba(99,102,241,.08);border-radius:6px;margin-top:.2rem}
    .file-count .label{font-size:.55rem;font-weight:500;color:#64748b;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.05em}
    .card ul::-webkit-scrollbar{width:3px}
    .card ul::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

    /* Summary cards - equal height */
    .summary-row{display:flex;gap:.4rem;flex:0 0 auto}
    .summary-card{flex:1;min-width:0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:.75rem .5rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px}
    .summary-card.success{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}
    .summary-card.failed{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
    .summary-card.skipped{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.05)}
    .summary-card .num{font-size:1.75rem;font-weight:700;line-height:1}
    .summary-card.success .num{color:#4ade80}
    .summary-card.failed .num{color:#ef4444}
    .summary-card.skipped .num{color:#f97316}
    .summary-card .lbl{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#64748b;margin-top:.25rem}
    .summary-card .btn-dl{margin-top:.5rem;padding:.25rem .6rem;font-size:.55rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;background:rgba(255,255,255,.08);color:#94a3b8;transition:all .2s}
    .summary-card .btn-dl:hover{background:rgba(255,255,255,.15);color:#e2e8f0}
    .summary-card.success .btn-dl:hover{background:rgba(34,197,94,.2);color:#4ade80}
    .summary-card.failed .btn-dl:hover{background:rgba(239,68,68,.2);color:#ef4444}
    .summary-card.skipped .btn-dl:hover{background:rgba(249,115,22,.2);color:#f97316}
    .summary-card .btn-dl:disabled{opacity:.4;cursor:not-allowed}

    /* Stage totals - equal height */
    .stage-totals{display:flex;gap:.4rem;flex:1;min-height:0;align-items:stretch}
    .stage-box{flex:1;min-width:0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:.75rem .5rem;text-align:center;display:flex;flex-direction:column;justify-content:center}
    .stage-box.original{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.05)}
    .stage-box.consensus{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}
    .stage-box.fallback{border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.05)}
    .stage-box .num{font-size:1.5rem;font-weight:700;line-height:1}
    .stage-box.original .num{color:#38bdf8}
    .stage-box.consensus .num{color:#4ade80}
    .stage-box.fallback .num{color:#f97316}
    .stage-box .lbl{font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#64748b;margin-top:.25rem}

    /* Left card internal spacing */
    .section-block{display:flex;flex-direction:column;gap:.25rem}
    .section-block .lbl{margin-top:.5rem}

    .ctrl{display:flex;flex-direction:column;gap:.4rem}
    .btn-group{display:flex;gap:.4rem}
    .btn{
      padding:.45rem .55rem;border:none;border-radius:7px;font-weight:600;font-size:.72rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:.25rem;font-family:inherit;transition:all .2s
    }
    .btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;flex:1}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px -6px rgba(99,102,241,.4)}
    .btn-primary:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary.running{background:linear-gradient(135deg,#f59e0b,#d97706)}
    .btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;display:none}
    .btn-stop:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px -6px rgba(239,68,68,.4)}
    .btn-stop:disabled{opacity:.35;cursor:not-allowed}
    .btn-secondary{background:rgba(255,255,255,.05);color:#94a3b8}
    .btn-secondary:hover{background:rgba(255,255,255,.09);color:#e2e8f0}
    .step-sel{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;
      color:#e2e8f0;padding:.45rem .4rem;font-size:.68rem;font-family:inherit;cursor:pointer;
      outline:none;flex:1;appearance:none;-webkit-appearance:none;text-align:center
    }
    .step-sel:hover{border-color:rgba(99,102,241,.4)}
    .step-sel option{background:#16163a;color:#e2e8f0}

    .toggle-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem}
    .toggle-label{font-size:.58rem;color:#64748b;text-transform:uppercase;letter-spacing:.03em;font-weight:600;white-space:nowrap}
    .toggle-label.on{color:#4ade80}.toggle-label.off{color:#ef4444}
    .switch{position:relative;width:44px;height:24px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.08);border-radius:99px;transition:.25s;border:1px solid rgba(255,255,255,.1)}
    .slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:2px;background:#6366f1;border-radius:50%;transition:.25s}
    input:checked+.slider{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5)}
    input:checked+.slider::before{transform:translateX(18px)}
    .prog-wrap{background:rgba(255,255,255,.04);border-radius:99px;height:5px;overflow:hidden}
    .prog-bar{height:100%;border-radius:99px;width:0%;background:linear-gradient(90deg,#6366f1,#38bdf8);transition:width .35s ease}
    .status-text{font-size:.62rem;color:#64748b;text-align:center}

    .row-inline{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
    .path-hint{flex:1;font-size:.55rem;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace}

    .step-indicator{display:flex;gap:4px;align-items:center}
    .step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.08);transition:all .3s ease;cursor:help}
    .step-dot.active{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.6);transform:scale(1.2)}
    .step-dot.done{background:#4ade80;border-color:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.4)}
    .step-dot.error{background:#ef4444;border-color:#dc2626;box-shadow:0 0 6px rgba(239,68,68,.4)}
    .step-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:.5rem;font-size:.62rem;color:#94a3b8;transition:opacity .3s ease}
    .step-bar-label{font-weight:600;color:#e2e8f0;white-space:nowrap}
    .log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;flex-shrink:0}
    .log-hdr span{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#64748b}
    .log-clear{background:none;border:none;color:#475569;font-size:.55rem;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;font-weight:600}
    .log-clear:hover{color:#ef4444}
    .log-box{
      overflow-y:auto;flex:1;min-height:0;scroll-behavior:smooth;
      font-family:'JetBrains Mono','Fira Code',monospace;font-size:.6rem;line-height:1.4
    }
    .log-box::-webkit-scrollbar{width:3px}
    .log-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
    .log-entry{color:#64748b;animation:fadeIn .1s ease}
    .log-entry .ts{color:#334155;margin-right:.25rem}
    .log-entry.success .msg{color:#4ade80}
    .log-entry.error .msg{color:#ef4444}
    .log-entry.system .msg{color:#60a5fa}
    .log-entry.command .msg{color:#a78bfa}
    .log-entry.stdout .msg{color:#94a3b8}
    .log-empty{color:#334155;text-align:center;padding:1rem 0;font-size:.62rem}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .count-row{display:flex;gap:.5rem;justify-content:center;margin-bottom:.3rem}
    .count-box{flex:1;min-width:0;padding:.4rem .5rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:6px;text-align:center}
    .count-box .num{font-size:1.1rem;font-weight:700;color:#6366f1}
    .count-box .lbl{font-size:.5rem;font-weight:500;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-top:.1rem}

    @media (max-width: 1100px){
      .main{grid-template-columns:1fr}
      .app{max-width:100%}
      .summary-row{flex-direction:column}
      .stage-totals{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>OCR Foto Timemark</h1>
      <p>Copy PDF ke folder lalu proses — 5-step batch</p>
    </div>

    <div class="main">
      <!-- KIRI: Progress File + Processing Summary + Stage Totals -->
      <div class="col col-left">
        <div class="card">
          <div class="section-block">
            <div class="lbl">📊 Progress File</div>
            <div class="count-row">
              <div class="count-box">
                <div class="num" id="count-01">0</div>
                <div class="lbl">PDF 2026</div>
              </div>
              <div class="count-box">
                <div class="num" id="count-02">0</div>
                <div class="lbl">PDF 2025</div>
              </div>
            </div>
          </div>

          <div class="section-block">
            <div class="lbl">📈 Processing Summary</div>
            <div class="summary-row">
              <div class="summary-card success">
                <div class="num" id="sum-success">0</div>
                <div class="lbl">Sukses</div>
              </div>
              <div class="summary-card failed">
                <div class="num" id="sum-failed">0</div>
                <div class="lbl">Gagal</div>
                <button class="btn-dl" id="dl-edit-failed" disabled>⬇ Excel</button>
              </div>
              <div class="summary-card skipped">
                <div class="num" id="sum-skipped">0</div>
                <div class="lbl">Terskip</div>
                <button class="btn-dl" id="dl-merge-skipped" disabled>⬇ Excel</button>
              </div>
            </div>
          </div>

          <div class="section-block">
            <div class="lbl">🎯 Stage Totals</div>
            <div class="stage-totals">
              <div class="stage-box original">
                <div class="num" id="stage-original">0</div>
                <div class="lbl">Original</div>
              </div>
              <div class="stage-box consensus">
                <div class="num" id="stage-consensus">0</div>
                <div class="lbl">Consensus</div>
              </div>
              <div class="stage-box fallback">
                <div class="num" id="stage-fallback">0</div>
                <div class="lbl">Fallback</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- KANAN: Kontrol + Log -->
      <div class="col col-right">
        <div class="card">
          <div class="lbl">⚙️ Kontrol Proses</div>
          <div class="ctrl">
            <div class="toggle-row">
              <span class="toggle-label" id="toggle-lbl-off">Skip</span>
              <label class="switch">
                <input type="checkbox" id="toggle-ow" checked>
                <span class="slider"></span>
              </label>
              <span class="toggle-label on" id="toggle-lbl-on">Overwrite</span>
            </div>
            <div class="btn-group">
              <button class="btn btn-secondary" id="btn-refresh">🔄 Refresh</button>
              <select class="step-sel" id="step-sel">
                <option value="all">Semua Tahap</option>
                <option value="step1">Step 1 — Export Foto</option>
                <option value="step2">Step 2 — Ekstrak Tanggal</option>
                <option value="step3">Step 3 — Scheduler</option>
                <option value="step4">Step 4 — Edit Timemark</option>
                <option value="step5">Step 5 — Gabung PDF</option>
              </select>
              <button class="btn btn-primary" id="btn-run">▶ Jalankan</button>
              <button class="btn btn-stop" id="btn-stop">⏹ Stop</button>
            </div>
            <div class="prog-wrap"><div class="prog-bar" id="progress-bar"></div></div>
            <div class="status-text" id="status-text">Idle</div>
          </div>
        </div>
        <!-- Step Indicator Bar (between controls and log) -->
        <div class="step-bar" id="step-bar" style="display:none">
          <span class="step-bar-label">Proses: </span>
          <div class="step-indicator">
            <span class="step-dot" data-step="step1" title="Step 1: Export Foto"></span>
            <span class="step-dot" data-step="step2" title="Step 2: Ekstrak Tanggal"></span>
            <span class="step-dot" data-step="step3" title="Step 3: Scheduler"></span>
            <span class="step-dot" data-step="step4" title="Step 4: Edit Timemark"></span>
            <span class="step-dot" data-step="step5" title="Step 5: Gabung PDF"></span>
          </div>
        </div>
        <div class="card">
          <div class="log-hdr"><span>Terminal Log</span><button class="log-clear" id="btn-clear-log">clear</button></div>
          <div class="log-box" id="log-box"><div class="log-empty">Menunggu log…</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const L=id=>document.getElementById(id);
    const stepOrder=['step1','step2','step3','step4','step5'];

    // Stage tracking SSE
    let stageEsConn=null, stageEsReconnectTimer=null;
    const stageCounts = {
      stage_1c_guide_original: 0,
      stage_1c_guide_consensus: 0,
      stage_fallback: 0
    };

    function esc(s){return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>')}

    function updateStageCounts(){
      L('stage-original').textContent = stageCounts.stage_1c_guide_original;
      L('stage-consensus').textContent = stageCounts.stage_1c_guide_consensus;
      L('stage-fallback').textContent = stageCounts.stage_fallback;
    }

    function connectStages(){
      if(stageEsConn){stageEsConn.close();stageEsConn=null;}
      if(stageEsReconnectTimer){clearTimeout(stageEsReconnectTimer);stageEsReconnectTimer=null;}
      const es=new EventSource('/api/stream-stages');
      stageEsConn=es;
      es.onopen=()=>{console.log('Stage SSE connected');};
      es.onmessage=e=>{
        try{
          const data=JSON.parse(e.data);
          if(data.type==='stage'){
            const stage = data.stage;
            if(stage==='stage_1c_guide_original'){
              stageCounts.stage_1c_guide_original++;
            }else if(stage==='stage_1c_guide_consensus'){
              stageCounts.stage_1c_guide_consensus++;
            }else if(stage==='stage_fallback' || stage==='stage_0_override'){
              stageCounts.stage_fallback++;
            }
            updateStageCounts();
          }
        }catch(err){console.warn('stage parse error',err);}
      };
      es.onerror=()=>{es.close();stageEsConn=null;stageEsReconnectTimer=setTimeout(connectStages,3000);};
    }

    async function loadConfig(){
      const r=await fetch('/api/config'),d=await r.json();
    }
    async function loadFiles(){
      try{
        const r=await fetch('/api/files');
        if(!r.ok){console.warn('loadFiles failed:',r.status);return;}
        const d=await r.json();
        const total1 = d['01_pdf_source']?.total || 0;
        const total2 = d['02_pdf_target']?.total || 0;
        L('count-01').textContent=total1;
        L('count-02').textContent=total2;
      }catch(e){console.warn('loadFiles error:',e);}
    }
    L('btn-refresh').onclick=loadFiles;

    async function loadSummary(){
      try{
        const r=await fetch('/api/summary');
        if(!r.ok) return;
        const d=await r.json();
        // d is {edit: {...}, merge: {...}}
        let success=0, failed=0, skipped=0;
        let editFailed=false, mergeSkipped=false;

        if(d.edit){
          success += d.edit.success || 0;
          failed += d.edit.failed || 0;
          editFailed = (d.edit.failed || 0) > 0;
        }
        if(d.merge){
          success += d.merge.success || 0;
          failed += d.merge.failed || 0;
          skipped += d.merge.skipped || 0;
          mergeSkipped = (d.merge.skipped || 0) > 0;
        }

        L('sum-success').textContent = success;
        L('sum-failed').textContent = failed;
        L('sum-skipped').textContent = skipped;

        // Enable download buttons if files exist
        L('dl-edit-failed').disabled = !editFailed;
        L('dl-merge-skipped').disabled = !mergeSkipped;
      }catch(e){console.warn('loadSummary error:',e);}
    }

    const btn=L('btn-run'),btnStop=L('btn-stop'),pb=L('progress-bar'),st=L('status-text'),tog=L('toggle-ow'),lblOn=L('toggle-lbl-on'),lblOff=L('toggle-lbl-off');
    tog.onchange=()=>{if(tog.checked){lblOn.className='toggle-label on';lblOff.className='toggle-label'}else{lblOn.className='toggle-label';lblOff.className='toggle-label off'}};
    btn.onclick=async()=>{
      if(btn.disabled)return;
      const step=L('step-sel').value;
      const overwrite=tog.checked;
      btn.disabled=true;btn.classList.add('running');btn.innerHTML='⏳ Proses…';
      btnStop.style.display='inline-flex';
      L('step-bar').style.display='flex';
      // Reset stage data on new run
      stageCounts.stage_1c_guide_original=0;
      stageCounts.stage_1c_guide_consensus=0;
      stageCounts.stage_fallback=0;
      updateStageCounts();
      // Reset dots
      document.querySelectorAll('.step-dot').forEach(d=>{d.className='step-dot'});
      try{const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step,overwrite})}),d=await r.json();if(d.status!=='ok'){alert(d.message);rst()}}catch{rst()};
    };
    btnStop.onclick=async()=>{btnStop.disabled=true;btnStop.innerHTML='⏹ Stopping…';try{await fetch('/api/stop',{method:'POST'})}catch{};};
    function rst(){btn.disabled=false;btn.classList.remove('running');btn.innerHTML='▶ Jalankan';btnStop.style.display='none';btnStop.disabled=false;btnStop.innerHTML='⏹ Stop';}

    // Poll status + summary
    setInterval(async()=>{
      try{
        const r=await fetch('/api/status'),s=await r.json();
        pb.style.width=s.progress+'%';
        st.textContent=s.status_text||'Idle';
        const statuses = s.step_statuses || {};
        const dots=document.querySelectorAll('.step-dot');
        const labels={'step1':'Export Foto','step2':'Ekstrak Tanggal','step3':'Scheduler','step4':'Edit Timemark','step5':'Gabung PDF'};
        dots.forEach(dot=>{
          const step=dot.dataset.step;
          const st = statuses[step] || 'waiting';
          dot.className = 'step-dot';
          if(st==='active') dot.classList.add('active');
          else if(st==='done') dot.classList.add('done');
          else if(st==='error') dot.classList.add('error');
          // waiting -> default (black)
        });
        const current = s.current_step;
        if(current){
          L('step-bar').style.display='flex';
          L('step-bar').querySelector('.step-bar-label').textContent='Proses: '+labels[current];
        } else if (!s.is_running && btn.disabled) {
          const isError = Object.values(statuses).includes('error');
          L('step-bar').querySelector('.step-bar-label').textContent = isError ? 'Proses: Gagal' : 'Proses: Selesai';
          rst();
          loadSummary();
        }
      }catch{}
    },800);

    // Download handlers
    L('dl-edit-failed').onclick=()=>window.open('/api/download/edit_failed','_blank');
    L('dl-merge-skipped').onclick=()=>window.open('/api/download/merge_skipped','_blank');

    const lb=L('log-box');
    let esConn=null, esReconnectTimer=null;
    function conn(){
      if(esConn){esConn.close();esConn=null;}
      if(esReconnectTimer){clearTimeout(esReconnectTimer);esReconnectTimer=null;}
      const es=new EventSource('/api/stream-logs');
      esConn=es;
      es.onopen=()=>{console.log('SSE connected');};
      es.onmessage=e=>{
        try{
          const data=JSON.parse(e.data);
          if(data.type==='reset'){
            lb.innerHTML='<div class="log-empty">Log direset untuk run baru</div>';
            return;
          }
          a(data);
        }catch{}
      };
      es.onerror=()=>{es.close();esConn=null;esReconnectTimer=setTimeout(conn,3000);};
    }
    function a(l){const em=lb.querySelector('.log-empty');if(em)em.remove();const d=document.createElement('div');d.className='log-entry '+(l.type||'info');d.innerHTML='<span class="ts">'+(l.timestamp||'')+'</span><span class="msg">'+esc(l.message)+'</span>';lb.appendChild(d);const isNearBottom=lb.scrollTop+lb.clientHeight>=lb.scrollHeight-40;if(isNearBottom)lb.scrollTop=lb.scrollHeight}
    L('btn-clear-log').onclick=()=>{lb.innerHTML='<div class="log-empty">Log dibersihkan</div>'};
    window.addEventListener('beforeunload',()=>{if(esConn){esConn.close();}if(stageEsConn){stageEsConn.close();}});
    loadConfig();loadFiles();conn();connectStages();loadSummary();
  </script>
</body>
</html>
