<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Foto Timemark</title>
  <meta name="description" content="Pipeline koreksi watermark Timemark.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:linear-gradient(150deg,#080811 0%,#0f0f24 30%,#16163a 60%,#0e0e2a 100%);
      color:#e2e8f0;display:flex;align-items:center;justify-content:center;padding:.75rem
    }
    .app{width:100%;max-width:1320px;height:100%;display:flex;flex-direction:column;gap:.5rem}
    .header{text-align:center;flex-shrink:0}
    .header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{font-size:.65rem;color:#475569;margin-top:.05rem}

    .main{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;flex:1;min-height:0}

    .col{display:flex;flex-direction:column;gap:.5rem;min-height:0}
    .col-left .card{flex:1;min-height:0}
    .col-right .card:first-child{flex-shrink:0}
    .col-right .card:last-child{flex:1;min-height:0}

    .card{
      background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.05);
      border-radius:10px;padding:.5rem;display:flex;flex-direction:column;min-width:0;overflow:hidden
    }
    .card .lbl{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#64748b;flex-shrink:0;margin-bottom:.3rem}
    .card ul{list-style:none;overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;gap:1px}
    .card li{font-size:.72rem;padding:.12rem .3rem;background:rgba(255,255,255,.015);border-radius:3px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
    .card .empty{color:#334155;font-size:.65rem;text-align:center;padding:.6rem 0}
    .card ul::-webkit-scrollbar{width:3px}
    .card ul::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

    .ctrl{display:flex;flex-direction:column;gap:.4rem}
    .btn-group{display:flex;gap:.4rem}
    .btn{
      padding:.45rem .55rem;border:none;border-radius:7px;font-weight:600;font-size:.72rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:.25rem;font-family:inherit;transition:all .2s
    }
    .btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;flex:1}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px -6px rgba(99,102,241,.4)}
    .btn-primary:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary.running{background:linear-gradient(135deg,#f59e0b,#d97706)}
    .btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;display:none}
    .btn-stop:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px -6px rgba(239,68,68,.4)}
    .btn-stop:disabled{opacity:.35;cursor:not-allowed}
    .btn-secondary{background:rgba(255,255,255,.05);color:#94a3b8}
    .btn-secondary:hover{background:rgba(255,255,255,.09);color:#e2e8f0}
    .step-sel{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;
      color:#e2e8f0;padding:.45rem .4rem;font-size:.68rem;font-family:inherit;cursor:pointer;
      outline:none;flex:1;appearance:none;-webkit-appearance:none;text-align:center
    }
    .step-sel:hover{border-color:rgba(99,102,241,.4)}
    .step-sel option{background:#16163a;color:#e2e8f0}

    .toggle-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem}
    .toggle-label{font-size:.58rem;color:#64748b;text-transform:uppercase;letter-spacing:.03em;font-weight:600;white-space:nowrap}
    .toggle-label.on{color:#4ade80}.toggle-label.off{color:#ef4444}
    .switch{position:relative;width:44px;height:24px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.08);border-radius:99px;transition:.25s;border:1px solid rgba(255,255,255,.1)}
    .slider::before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:2px;background:#6366f1;border-radius:50%;transition:.25s}
    input:checked+.slider{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5)}
    input:checked+.slider::before{transform:translateX(18px)}
    .prog-wrap{background:rgba(255,255,255,.04);border-radius:99px;height:5px;overflow:hidden}
    .prog-bar{height:100%;border-radius:99px;width:0%;background:linear-gradient(90deg,#6366f1,#38bdf8);transition:width .35s ease}
    .status-text{font-size:.62rem;color:#64748b;text-align:center}

    .row-inline{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
    .path-hint{flex:1;font-size:.55rem;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace}

    .log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:.15rem;flex-shrink:0}
    .log-hdr>span{font-size:.58rem;color:#475569;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
    .log-clear{background:none;border:none;color:#334155;cursor:pointer;font-size:.58rem;padding:.1rem .3rem;border-radius:3px;font-family:inherit}
    .log-clear:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
    .log-box{
      background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04);border-radius:7px;padding:.3rem .4rem;
      overflow-y:auto;flex:1;min-height:0;
      font-family:'JetBrains Mono','Fira Code',monospace;font-size:.6rem;line-height:1.4
    }
    .log-box::-webkit-scrollbar{width:3px}
    .log-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}
    .log-entry{color:#64748b;animation:fadeIn .1s ease}
    .log-entry .ts{color:#334155;margin-right:.25rem}
    .log-entry.success .msg{color:#4ade80}
    .log-entry.error .msg{color:#ef4444}
    .log-entry.system .msg{color:#60a5fa}
    .log-entry.command .msg{color:#a78bfa}
    .log-entry.stdout .msg{color:#94a3b8}
    .log-empty{color:#334155;text-align:center;padding:1rem 0;font-size:.62rem}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>OCR Foto Timemark</h1>
      <p>Copy PDF ke folder lalu proses — 5-step batch</p>
    </div>

    <div class="main">
      <!-- KIRI: 2 card vertikal -->
      <div class="col col-left">
        <div class="card">
          <div class="lbl">📂 Upload Folder IMO 2026</div>
          <div class="row-inline">
            <button class="btn btn-secondary folder-btn" data-folder="01_pdf_source" style="font-size:.66rem;padding:.3rem .5rem">Buka Folder</button>
            <span class="path-hint" id="hint-01">…</span>
          </div>
          <div class="lbl">📄 PDF 2026 — foto mentah</div>
          <ul id="list-01"><li class="empty">Memuat…</li></ul>
        </div>
        <div class="card">
          <div class="lbl">📂 Upload Folder IMO 2025</div>
          <div class="row-inline">
            <button class="btn btn-secondary folder-btn" data-folder="02_pdf_target" style="font-size:.66rem;padding:.3rem .5rem">Buka Folder</button>
            <span class="path-hint" id="hint-02">…</span>
          </div>
          <div class="lbl">📄 PDF 2025 — target / imo</div>
          <ul id="list-02"><li class="empty">Memuat…</li></ul>
        </div>
      </div>

      <!-- KANAN: tombol (atas) + log (bawah) -->
      <div class="col col-right">
        <div class="card">
          <div class="lbl">⚙️ Kontrol Proses</div>
          <div class="ctrl">
            <div class="toggle-row">
              <span class="toggle-label" id="toggle-lbl-off">Skip</span>
              <label class="switch">
                <input type="checkbox" id="toggle-ow" checked>
                <span class="slider"></span>
              </label>
              <span class="toggle-label on" id="toggle-lbl-on">Overwrite</span>
            </div>
            <div class="btn-group">
              <button class="btn btn-secondary" id="btn-refresh">🔄 Refresh</button>
              <select class="step-sel" id="step-sel">
                <option value="all">Semua Tahap</option>
                <option value="step1">Step 1 — Export Foto</option>
                <option value="step2">Step 2 — Ekstrak Tanggal</option>
                <option value="step3">Step 3 — Scheduler</option>
                <option value="step4">Step 4 — Edit Timemark</option>
                <option value="step5">Step 5 — Gabung PDF</option>
              </select>
              <button class="btn btn-primary" id="btn-run">▶ Jalankan</button>
              <button class="btn btn-stop" id="btn-stop">⏹ Stop</button>
            </div>
            <div class="prog-wrap"><div class="prog-bar" id="progress-bar"></div></div>
            <div class="status-text" id="status-text">Idle</div>
          </div>
        </div>
        <div class="card">
          <div class="log-hdr"><span>Terminal Log</span><button class="log-clear" id="btn-clear-log">clear</button></div>
          <div class="log-box" id="log-box"><div class="log-empty">Menunggu log…</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const L=id=>document.getElementById(id);
    document.querySelectorAll('.folder-btn').forEach(b=>b.onclick=()=>fetch('/api/open-folder/'+b.dataset.folder));
    async function loadConfig(){
      const r=await fetch('/api/config'),d=await r.json();
      L('hint-01').textContent=d['01_pdf_source']||'';L('hint-02').textContent=d['02_pdf_target']||''
    }
    async function loadFiles(){
      const r=await fetch('/api/files'),d=await r.json();
      for(const[k,id]of[['01_pdf_source','list-01'],['02_pdf_target','list-02']]){
        const fs=d[k]||[],el=L(id);
        el.innerHTML=fs.length?fs.map(x=>`<li title="${esc(x)}">${esc(x)}</li>`).join(''):'<li class="empty">Kosong</li>'
      }
    }
    L('btn-refresh').onclick=loadFiles;
    const btn=L('btn-run'),btnStop=L('btn-stop'),pb=L('progress-bar'),st=L('status-text'),tog=L('toggle-ow'),lblOn=L('toggle-lbl-on'),lblOff=L('toggle-lbl-off');
    tog.onchange=()=>{if(tog.checked){lblOn.className='toggle-label on';lblOff.className='toggle-label'}else{lblOn.className='toggle-label';lblOff.className='toggle-label off'}};
    btn.onclick=async()=>{
      if(btn.disabled)return;
      const step=L('step-sel').value;
      const overwrite=tog.checked;
      btn.disabled=true;btn.classList.add('running');btn.innerHTML='⏳ Proses…';
      btnStop.style.display='inline-flex';btn.innerHTML='⏳ Proses…';
      try{const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step,overwrite})}),d=await r.json();if(d.status!=='ok'){alert(d.message);rst()}}catch{rst()}
    };
    btnStop.onclick=async()=>{btnStop.disabled=true;btnStop.innerHTML='⏹ Stopping…';try{await fetch('/api/stop',{method:'POST'})}catch{};};
    function rst(){btn.disabled=false;btn.classList.remove('running');btn.innerHTML='▶ Jalankan';btnStop.style.display='none';btnStop.disabled=false;btnStop.innerHTML='⏹ Stop'}
    setInterval(async()=>{try{const r=await fetch('/api/status'),s=await r.json();pb.style.width=s.progress+'%';st.textContent=s.status_text||'Idle';if(!s.is_running&&btn.disabled)rst()}catch{}},800);
    const lb=L('log-box');
    function conn(){const es=new EventSource('/api/stream-logs');es.onmessage=e=>{try{a(JSON.parse(e.data))}catch{}};es.onerror=()=>{es.close();setTimeout(conn,1200)}}
    function a(l){const em=lb.querySelector('.log-empty');if(em)em.remove();const d=document.createElement('div');d.className='log-entry '+(l.type||'info');d.innerHTML='<span class="ts">'+(l.timestamp||'')+'</span><span class="msg">'+esc(l.message)+'</span>';lb.appendChild(d);lb.scrollTop=lb.scrollHeight}
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    L('btn-clear-log').onclick=()=>{lb.innerHTML='<div class="log-empty">Log dibersihkan</div>'};
    loadConfig();loadFiles();conn();
  </script>
</body>
</html>
